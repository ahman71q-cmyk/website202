<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Website</title>
    <link rel="stylesheet" href="style.css" >
</head>

<body>
    <!-- عناصر التصميم -->
    <div class="signal-bar">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    
    <div class="wave"></div>
    <div class="tower"></div>
    
    <div id="app"></div>
    
    <!-- صندوق الرسائل -->
    <div id="messagesPanel" class="messages-panel" style="display: none;">
        <div class="messages-header" onclick="toggleMessages()">
            <h3>📨 الرسائل <span id="unreadCount" class="unread-badge">0</span></h3>
            <span>▼</span>
        </div>
        <div id="messagesContent" class="messages-content" style="display: none;">
            <!-- الرسائل تظهر هنا -->
        </div>
        <div id="messageInput" class="message-input" style="display: none;">
            <input type="text" id="newMessage" placeholder="اكتب رسالتك...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
    
    <div class="footer">
        <div><span>📡 5G Network Project Management System 📡</span></div> 
        <div><span> Ahmed karam </span></div>
        <div><span> said tiger  & Ahmed El Mongy </span></div>


    </div>

<!-- ✅ بدون مسافات -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="main.js"></script>

</body>
</html>
