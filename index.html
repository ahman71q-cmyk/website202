<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5G Network Project Management System</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ مكتبة Supabase ضرورية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- خلفية الموجات والأبراج -->
    <div class="wave"></div>
    <div class="tower"></div>
    
    <!-- شريط الإشارة -->
    <div class="signal-bar">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
    </div>

    <!-- ✅ الحاوية الرئيسية للتطبيق -->
    <div id="app"></div>

    <!-- ✅ لوحة الرسائل (ضرورية جداً) -->
    <div id="messagesPanel" class="messages-panel" style="display: none;">
        <div class="messages-header" onclick="toggleMessages()">
            <h3>📨 الرسائل <span id="unreadCount" class="unread-badge" style="display:none;">0</span></h3>
            <span>▼</span>
        </div>
        <div id="messagesContent" class="messages-content" style="display: none;"></div>
        <div id="messageInput" class="message-input" style="display: none;">
            <input type="text" id="newMessage" placeholder="اكتب رسالتك...">
            <button onclick="sendMessage()">إرسال 🚀</button>
        </div>
    </div>

    <div class="footer">
        📡 5G Network Project Management System &copy; 2024
    </div>

    <script src="main.js"></script>
</body>
</html>
